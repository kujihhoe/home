description = "中科大科技史系主辦的系列讀書會，我導讀一篇石雲里老師的文章。"
quote = "柯棋瀚领读了JAHH 2024年第3期论文The astronomical meaning of some jade artifacts unearthed at the Lingjiatan site. 2: The jade pigs。文章首先指出玉猪07M23:1埋葬方式的特殊之处，及其与以猪为原型的星宿形状的相似之处，进而探讨其天文含义。通过对文本和考古证据的系统分析，作者将猪形星宿的存在追溯到新石器时代。通过计算机模拟回溯，作者又发现，在凌家滩文化所处年代的立春黎明时分，猪形星宿在东方地平线上的位置与玉猪07M23:1的特殊埋葬姿态非常吻合，说明玉猪确实应该是猪形星座的代表，其特殊埋藏方式模仿的是该星宿在立春黎明晨出东方的天象。根据早期中国的“飞鸟携日”观念，作者推测，在凌家滩聚落居民的心目中，玉鹰98M29:6可能是春天来临时太阳与猪形星宿处于相同位置的象征。柯棋瀚还通过学界对玉猪及其象征意义的不同解释，探讨了出土文献与传世文献结合的可能与限度。"